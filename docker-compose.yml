services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hypha
      POSTGRES_PASSWORD: hypha
      POSTGRES_DB: hypha_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypha -d hypha_test"]
      interval: 2s
      timeout: 5s
      retries: 15
