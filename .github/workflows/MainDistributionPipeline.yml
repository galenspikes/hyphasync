#
# DuckDB extension-template default: build/test extension binaries across a platform matrix.
# Hyphasync uses native libpq — not compatible with DuckDB-Wasm; wasm targets are excluded.
#
# You do not need the full matrix on every push. For day-to-day PRs, reduced_ci_mode skips
# redundant architectures (see extension-ci-tools/scripts/modify_distribution_matrix.py).
# Run the full matrix (minus wasm) on main; use workflow_dispatch for a manual full run.
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5-variegata
      extension_name: hyphasync
      # libpq is a native Postgres client; DuckDB-Wasm cannot use it.
      exclude_archs: wasm_mvp;wasm_eh;wasm_threads
      # PRs and feature-branch pushes: linux_amd64 + osx_arm64 + windows (reduced set).
      # main: full matrix (still without wasm).
      reduced_ci_mode: ${{ github.ref == 'refs/heads/main' && 'disabled' || 'enabled' }}

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5-variegata
      extension_name: hyphasync
      format_checks: 'format;tidy'
